<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Games - SpecMatch</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/catalog.css">
</head>

<body>
    <div class="page-wrapper">
        <!-- Navigation -->
        <nav class="navbar">
            <div class="navbar-container">
                <a href="index.html" class="navbar-brand">
                    <i class="fas fa-laptop"></i>
                    <span>SpecMatch</span>
                </a>
                <div class="navbar-menu">
                    <a href="index.html" class="navbar-link">Home</a>
                    <a href="laptops.html" class="navbar-link">Laptops</a>
                    <a href="games.html" class="navbar-link active">Games</a>
                </div>
                <div class="navbar-actions" id="authSection"></div>
            </div>
        </nav>

        <main class="main-content">
            <div class="games-catalog-container">
                <!-- Search Header -->
                <div class="games-search-header">
                    <h1 class="page-title">Browse Games</h1>
                    <p class="page-subtitle">Search for games to check compatibility with your laptop</p>

                    <div class="search-box-large">
                        <i class="fas fa-search search-icon"></i>
                        <input type="text" class="search-input-large" id="searchInput" placeholder="Search games..."
                            autocomplete="off">
                        <button class="btn btn-primary" id="searchBtn">
                            Search
                        </button>
                    </div>

                    <div class="search-hint">
                        Press <kbd>Enter</kbd> or click Search to see all matching games
                    </div>
                </div>

                <!-- Search Meta -->
                <div class="search-meta-bar" id="searchMetaBar">
                    <!-- Populated by JS -->
                </div>

                <!-- Results Grid -->
                <div class="games-grid" id="resultsGrid">
                    <div class="initial-state">
                        <i class="fas fa-gamepad"></i>
                        <h3>Search for Games</h3>
                        <p>Type a game name above and press Enter to search</p>
                    </div>
                </div>

                <!-- Pagination -->
                <div class="pagination" id="pagination">
                    <!-- Populated by JS -->
                </div>
            </div>
        </main>

        <!-- Chatbot FAB -->
        <button class="chatbot-fab" onclick="window.location.href='index.html#chatbot'" title="AI Assistant">
            <i class="fas fa-robot"></i>
        </button>
    </div>

    <script type="module">
        import { api } from './scripts/api.js';
        import { getSteamHeaderImage, getUrlParams, setUrlParams, debounce } from './scripts/utils.js';

        // State
        let currentPage = 1;
        let currentQuery = '';

        // DOM Elements
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const resultsGrid = document.getElementById('resultsGrid');
        const searchMetaBar = document.getElementById('searchMetaBar');
        const pagination = document.getElementById('pagination');

        // Initialize from URL
        function initFromUrl() {
            const params = getUrlParams();
            if (params.q) {
                searchInput.value = params.q;
                currentQuery = params.q;
                if (params.page) {
                    currentPage = parseInt(params.page);
                }
                searchGames(params.q, currentPage);
            }
        }

        // Search games
        async function searchGames(query, page = 1) {
            if (!query.trim()) return;

            currentQuery = query.trim();
            currentPage = page;

            resultsGrid.innerHTML = `
                <div class="loading-state">
                    <div class="spinner"></div>
                    <p>Searching games...</p>
                </div>
            `;

            try {
                const response = await api.getGameSearchResults(currentQuery, page, 24);

                if (response.success) {
                    const { games, total, page: currentPageNum, totalPages } = response.data;

                    renderResults(games);
                    updateMeta(total, currentPageNum, totalPages);
                    updatePagination(currentPageNum, totalPages);

                    // Update URL
                    setUrlParams({ q: currentQuery, page: currentPage > 1 ? currentPage : null });
                }
            } catch (error) {
                console.error('Search error:', error);
                resultsGrid.innerHTML = `
                    <div class="error-state">
                        <i class="fas fa-exclamation-circle"></i>
                        <p>Error searching games. Please try again.</p>
                    </div>
                `;
            }
        }

        // Render results
        function renderResults(games) {
            if (!games || games.length === 0) {
                resultsGrid.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-search"></i>
                        <h3>No Games Found</h3>
                        <p>Try a different search term</p>
                    </div>
                `;
                return;
            }

            resultsGrid.innerHTML = games.map(game => `
                <div class="game-card card" onclick="window.location.href='game.html?appId=${game.steam_appid}'">
                    <div class="card-image-wrapper">
                        <img src="${getSteamHeaderImage(game.steam_appid)}" 
                             alt="${game.name}" 
                             class="card-image"
                             loading="lazy"
                             onerror="this.onerror=null; this.src='https://placehold.co/460x215?text=No+Image'">
                    </div>
                    <div class="card-body">
                        <div class="card-title game-name">${game.name}</div>
                        ${game.genres?.length > 0 ? `
                            <div class="game-tags">
                                ${game.genres.slice(0, 3).map(g => `
                                    <span class="game-tag">${g.description || g}</span>
                                `).join('')}
                            </div>
                        ` : ''}
                        ${game.release_date || game.developers?.length > 0 ? `
                            <div class="game-meta">
                                ${game.release_date?.date ? `
                                    <span><i class="fas fa-calendar"></i> ${game.release_date.date}</span>
                                ` : ''}
                                ${game.developers?.length > 0 ? `
                                    <span><i class="fas fa-code"></i> ${game.developers[0]}</span>
                                ` : ''}
                            </div>
                        ` : ''}
                    </div>
                </div>
            `).join('');
        }

        // Update meta bar
        function updateMeta(total, page, totalPages) {
            if (!total) {
                searchMetaBar.innerHTML = '';
                return;
            }

            searchMetaBar.innerHTML = `
                <span class="meta-results">${total.toLocaleString()} games found</span>
                <span class="meta-page">Page ${page} of ${totalPages}</span>
            `;
        }

        // Update pagination
        function updatePagination(current, total) {
            if (total <= 1) {
                pagination.innerHTML = '';
                return;
            }

            let html = '';

            // Previous button
            html += `<button class="pagination-btn" ${current === 1 ? 'disabled' : ''} data-page="${current - 1}">
                <i class="fas fa-chevron-left"></i>
            </button>`;

            // Page numbers
            const maxVisible = 5;
            let start = Math.max(1, current - Math.floor(maxVisible / 2));
            let end = Math.min(total, start + maxVisible - 1);

            if (end - start + 1 < maxVisible) {
                start = Math.max(1, end - maxVisible + 1);
            }

            if (start > 1) {
                html += `<button class="pagination-btn" data-page="1">1</button>`;
                if (start > 2) html += `<span class="pagination-ellipsis">...</span>`;
            }

            for (let i = start; i <= end; i++) {
                html += `<button class="pagination-btn ${i === current ? 'active' : ''}" data-page="${i}">${i}</button>`;
            }

            if (end < total) {
                if (end < total - 1) html += `<span class="pagination-ellipsis">...</span>`;
                html += `<button class="pagination-btn" data-page="${total}">${total}</button>`;
            }

            // Next button
            html += `<button class="pagination-btn" ${current === total ? 'disabled' : ''} data-page="${current + 1}">
                <i class="fas fa-chevron-right"></i>
            </button>`;

            pagination.innerHTML = html;

            // Add click handlers
            pagination.querySelectorAll('.pagination-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const page = parseInt(btn.dataset.page);
                    if (page && page !== current) {
                        searchGames(currentQuery, page);
                        window.scrollTo({ top: 0, behavior: 'smooth' });
                    }
                });
            });
        }

        // Event Listeners
        searchBtn.addEventListener('click', () => {
            const query = searchInput.value.trim();
            if (query) {
                searchGames(query, 1);
            }
        });

        searchInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const query = searchInput.value.trim();
                if (query) {
                    searchGames(query, 1);
                }
            }
        });

        // Load auth state
        function loadAuthState() {
            const user = JSON.parse(localStorage.getItem('specmatch_user'));
            const authSection = document.getElementById('authSection');

            if (user) {
                authSection.innerHTML = `
                    <a href="profile.html" class="navbar-user">
                        <div class="navbar-user-avatar">${user.name?.[0]?.toUpperCase() || 'U'}</div>
                        <span>${user.name || 'User'}</span>
                    </a>
                `;
            } else {
                authSection.innerHTML = `
                    <a href="login.html" class="btn btn-ghost">Sign In</a>
                    <a href="signup.html" class="btn btn-primary btn-sm">Sign Up</a>
                `;
            }
        }

        // Initialize
        loadAuthState();
        initFromUrl();
    </script>

    <style>
        /* Games Page Specific Styles */
        .games-catalog-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        .games-search-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .page-title {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }

        .page-subtitle {
            font-size: 1.125rem;
            color: var(--text-muted);
            margin-bottom: 2rem;
        }

        .search-box-large {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            max-width: 700px;
            margin: 0 auto;
            background: var(--surface);
            border: 2px solid var(--border);
            border-radius: var(--radius-xl);
            padding: 0.5rem;
            transition: all 0.2s ease;
        }

        .search-box-large:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-light);
        }

        .search-box-large .search-icon {
            padding: 0 0.75rem;
            color: var(--text-muted);
        }

        .search-input-large {
            flex: 1;
            padding: 0.75rem 0;
            font-size: 1.125rem;
            border: none;
            background: transparent;
            color: var(--text-primary);
        }

        .search-input-large:focus {
            outline: none;
        }

        .search-box-large .btn {
            border-radius: var(--radius-lg);
            padding: 0.75rem 1.5rem;
        }

        .search-hint {
            margin-top: 1rem;
            font-size: 0.875rem;
            color: var(--text-muted);
        }

        .search-hint kbd {
            display: inline-block;
            padding: 0.125rem 0.375rem;
            background: var(--bg-alt);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-family: inherit;
            font-size: 0.75rem;
        }

        .search-meta-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 0;
            margin-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }

        .meta-results {
            font-weight: 500;
            color: var(--text-primary);
        }

        .meta-page {
            font-size: 0.875rem;
            color: var(--text-muted);
        }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
        }

        .game-card .card-image-wrapper {
            aspect-ratio: 460/215;
        }

        .game-card .card-body {
            padding: 1rem;
        }

        .game-name {
            font-size: 1rem;
            margin-bottom: 0.5rem;
        }

        .initial-state {
            grid-column: 1 / -1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 6rem 2rem;
            text-align: center;
            color: var(--text-muted);
        }

        .initial-state i {
            font-size: 4rem;
            margin-bottom: 1.5rem;
            opacity: 0.5;
        }

        .initial-state h3 {
            font-size: 1.5rem;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }

        @media (max-width: 768px) {
            .games-catalog-container {
                padding: 1rem;
            }

            .page-title {
                font-size: 1.75rem;
            }

            .search-box-large {
                flex-direction: column;
                padding: 0.75rem;
            }

            .search-box-large .btn {
                width: 100%;
            }

            .games-grid {
                grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
                gap: 1rem;
            }
        }
    </style>
</body>

</html>
