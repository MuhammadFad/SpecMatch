<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - SpecMatch</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="public/styles/main.css">
</head>

<body>
    <div class="page-wrapper">
        <!-- Navigation -->
        <nav class="navbar">
            <div class="navbar-container">
                <a href="index.html" class="navbar-brand">
                    <i class="fas fa-laptop"></i>
                    <span>SpecMatch</span>
                </a>
                <div class="navbar-menu">
                    <a href="index.html" class="navbar-link">Home</a>
                    <a href="laptops.html" class="navbar-link">Laptops</a>
                    <a href="games.html" class="navbar-link">Games</a>
                </div>
                <div class="navbar-actions" id="authSection"></div>
            </div>
        </nav>

        <main class="main-content">
            <div class="profile-container" id="profileContent">
                <div class="loading-state">
                    <div class="spinner"></div>
                    <p>Loading profile...</p>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { api } from './public/scripts/api.js';
        import { debounce } from './public/scripts/utils.js';

        // State
        let user = null;
        let userLaptops = [];
        let onboardingOptions = null;

        const container = document.getElementById('profileContent');

        // Check if user is logged in
        function checkAuth() {
            user = JSON.parse(localStorage.getItem('specmatch_user'));
            if (!user) {
                window.location.href = 'login.html';
                return false;
            }
            return true;
        }

        // Load user data
        async function loadUserData() {
            if (!checkAuth()) return;

            try {
                // Load user laptops
                const laptopsResponse = await api.getUserLaptops(user.uid);
                if (laptopsResponse.success) {
                    userLaptops = laptopsResponse.data || [];
                }

                // Load onboarding options for add laptop form
                const optionsResponse = await api.getOnboardingOptions();
                if (optionsResponse.success) {
                    onboardingOptions = optionsResponse.data;
                }

                renderProfile();
            } catch (error) {
                console.error('Error loading profile:', error);
                container.innerHTML = `
                    <div class="error-state">
                        <i class="fas fa-exclamation-circle"></i>
                        <p>Error loading profile</p>
                        <button class="btn btn-primary" onclick="location.reload()">Retry</button>
                    </div>
                `;
            }
        }

        // Render profile
        function renderProfile() {
            container.innerHTML = `
                <div class="profile-header">
                    <div class="profile-avatar">
                        ${user.photoURL
                    ? `<img src="${user.photoURL}" alt="${user.name}">`
                    : `<span>${user.name?.[0]?.toUpperCase() || 'U'}</span>`
                }
                    </div>
                    <div class="profile-info">
                        <h1>${user.name || 'User'}</h1>
                        <p>${user.email}</p>
                    </div>
                    <button class="btn btn-ghost" id="logoutBtn">
                        <i class="fas fa-sign-out-alt"></i> Sign Out
                    </button>
                </div>

                <div class="profile-section">
                    <div class="section-header">
                        <h2><i class="fas fa-laptop"></i> My Laptops</h2>
                        <button class="btn btn-primary btn-sm" id="addLaptopBtn">
                            <i class="fas fa-plus"></i> Add Laptop
                        </button>
                    </div>

                    ${userLaptops.length > 0 ? `
                        <div class="laptops-grid">
                            ${userLaptops.map(laptop => renderLaptopCard(laptop)).join('')}
                        </div>
                    ` : `
                        <div class="empty-laptops">
                            <i class="fas fa-laptop-medical"></i>
                            <h3>No Laptops Added</h3>
                            <p>Add your laptop specs to check game compatibility</p>
                        </div>
                    `}
                </div>

                <!-- Add Laptop Modal -->
                <div class="modal" id="addLaptopModal">
                    <div class="modal-backdrop"></div>
                    <div class="modal-content">
                        <div class="modal-header">
                            <h3>Add Your Laptop</h3>
                            <button class="modal-close" id="closeModal">&times;</button>
                        </div>
                        <div class="modal-body">
                            <form id="addLaptopForm">
                                <div class="form-group">
                                    <label class="form-label">Laptop Name (optional)</label>
                                    <input type="text" class="form-input" id="laptopName" placeholder="e.g., My Gaming Laptop">
                                </div>

                                <div class="form-group">
                                    <label class="form-label">CPU <span class="required">*</span></label>
                                    <input type="text" class="form-input" id="cpuInput" placeholder="Start typing CPU name...">
                                    <div class="autocomplete-dropdown" id="cpuDropdown"></div>
                                    <input type="hidden" id="cpuScore">
                                </div>

                                <div class="form-group">
                                    <label class="form-label">GPU <span class="required">*</span></label>
                                    <input type="text" class="form-input" id="gpuInput" placeholder="Start typing GPU name...">
                                    <div class="autocomplete-dropdown" id="gpuDropdown"></div>
                                    <input type="hidden" id="gpuScore">
                                </div>

                                <div class="form-row">
                                    <div class="form-group">
                                        <label class="form-label">RAM <span class="required">*</span></label>
                                        <select class="form-select" id="ramSelect" required>
                                            <option value="">Select RAM</option>
                                        </select>
                                    </div>
                                    <div class="form-group">
                                        <label class="form-label">Storage</label>
                                        <select class="form-select" id="storageSelect">
                                            <option value="">Select Storage</option>
                                        </select>
                                    </div>
                                </div>

                                <div class="form-actions">
                                    <button type="button" class="btn btn-ghost" id="cancelAdd">Cancel</button>
                                    <button type="submit" class="btn btn-primary">Add Laptop</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            `;

            // Setup event handlers
            setupEventHandlers();
            populateDropdowns();
        }

        // Render laptop card
        function renderLaptopCard(laptop) {
            return `
                <div class="user-laptop-card" data-id="${laptop._id}">
                    <div class="laptop-card-content">
                        <h4>${laptop.name || 'My Laptop'}</h4>
                        <div class="laptop-specs">
                            ${laptop.cpu?.name ? `<span><i class="fas fa-microchip"></i> ${laptop.cpu.name}</span>` : ''}
                            ${laptop.gpu?.name ? `<span><i class="fas fa-tv"></i> ${laptop.gpu.name}</span>` : ''}
                            ${laptop.ram?.size_gb ? `<span><i class="fas fa-memory"></i> ${laptop.ram.size_gb} GB</span>` : ''}
                            ${laptop.storage?.capacity_gb ? `<span><i class="fas fa-hdd"></i> ${laptop.storage.capacity_gb >= 1024 ? (laptop.storage.capacity_gb / 1024) + ' TB' : laptop.storage.capacity_gb + ' GB'}</span>` : ''}
                        </div>
                    </div>
                    <button class="btn-icon delete-laptop" data-id="${laptop._id}" title="Remove laptop">
                        <i class="fas fa-trash"></i>
                    </button>
                </div>
            `;
        }

        // Setup event handlers
        function setupEventHandlers() {
            // Logout
            document.getElementById('logoutBtn').addEventListener('click', () => {
                localStorage.removeItem('specmatch_user');
                window.location.href = 'login.html';
            });

            // Add laptop modal
            const modal = document.getElementById('addLaptopModal');
            document.getElementById('addLaptopBtn').addEventListener('click', () => {
                modal.classList.add('active');
            });
            document.getElementById('closeModal').addEventListener('click', () => {
                modal.classList.remove('active');
            });
            document.getElementById('cancelAdd').addEventListener('click', () => {
                modal.classList.remove('active');
            });
            modal.querySelector('.modal-backdrop').addEventListener('click', () => {
                modal.classList.remove('active');
            });

            // Add laptop form
            document.getElementById('addLaptopForm').addEventListener('submit', handleAddLaptop);

            // Delete laptop buttons
            document.querySelectorAll('.delete-laptop').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const laptopId = e.currentTarget.dataset.id;
                    handleDeleteLaptop(laptopId);
                });
            });

            // CPU autocomplete
            setupAutocomplete('cpuInput', 'cpuDropdown', 'cpuScore', onboardingOptions?.cpus || []);

            // GPU autocomplete
            setupAutocomplete('gpuInput', 'gpuDropdown', 'gpuScore', onboardingOptions?.gpus || []);
        }

        // Setup autocomplete
        function setupAutocomplete(inputId, dropdownId, scoreId, items) {
            const input = document.getElementById(inputId);
            const dropdown = document.getElementById(dropdownId);
            const scoreInput = document.getElementById(scoreId);

            const search = debounce((query) => {
                if (query.length < 2) {
                    dropdown.innerHTML = '';
                    dropdown.classList.remove('active');
                    return;
                }

                const filtered = items.filter(item =>
                    item.name.toLowerCase().includes(query.toLowerCase())
                ).slice(0, 10);

                if (filtered.length > 0) {
                    dropdown.innerHTML = filtered.map(item => `
                        <div class="autocomplete-item" data-name="${item.name}" data-score="${item.score || 0}">
                            ${item.name}
                        </div>
                    `).join('');
                    dropdown.classList.add('active');

                    dropdown.querySelectorAll('.autocomplete-item').forEach(item => {
                        item.addEventListener('click', () => {
                            input.value = item.dataset.name;
                            scoreInput.value = item.dataset.score;
                            dropdown.classList.remove('active');
                        });
                    });
                } else {
                    dropdown.innerHTML = `<div class="autocomplete-empty">No matches found</div>`;
                    dropdown.classList.add('active');
                }
            }, 200);

            input.addEventListener('input', (e) => search(e.target.value.trim()));

            document.addEventListener('click', (e) => {
                if (!input.contains(e.target) && !dropdown.contains(e.target)) {
                    dropdown.classList.remove('active');
                }
            });
        }

        // Populate dropdowns
        function populateDropdowns() {
            const ramSelect = document.getElementById('ramSelect');
            const storageSelect = document.getElementById('storageSelect');

            (onboardingOptions?.ramSizes || [8, 16, 32, 64]).forEach(size => {
                const option = document.createElement('option');
                option.value = size;
                option.textContent = `${size} GB`;
                ramSelect.appendChild(option);
            });

            (onboardingOptions?.storageSizes || [256, 512, 1024, 2048]).forEach(size => {
                const option = document.createElement('option');
                option.value = size;
                option.textContent = size >= 1024 ? `${size / 1024} TB` : `${size} GB`;
                storageSelect.appendChild(option);
            });
        }

        // Handle add laptop
        async function handleAddLaptop(e) {
            e.preventDefault();

            const cpuName = document.getElementById('cpuInput').value.trim();
            const gpuName = document.getElementById('gpuInput').value.trim();
            const ramSize = document.getElementById('ramSelect').value;
            const storageSize = document.getElementById('storageSelect').value;
            const laptopName = document.getElementById('laptopName').value.trim();

            if (!cpuName || !gpuName || !ramSize) {
                alert('Please fill in all required fields');
                return;
            }

            const laptopData = {
                name: laptopName || 'My Laptop',
                cpu: {
                    name: cpuName,
                    benchmark_score: parseInt(document.getElementById('cpuScore').value) || 0
                },
                gpu: {
                    name: gpuName,
                    benchmark_score: parseInt(document.getElementById('gpuScore').value) || 0
                },
                ram: {
                    size_gb: parseInt(ramSize)
                }
            };

            if (storageSize) {
                laptopData.storage = { capacity_gb: parseInt(storageSize) };
            }

            try {
                const response = await api.addUserLaptop(user.uid, laptopData);
                if (response.success) {
                    document.getElementById('addLaptopModal').classList.remove('active');
                    loadUserData(); // Reload
                }
            } catch (error) {
                console.error('Error adding laptop:', error);
                alert('Failed to add laptop. Please try again.');
            }
        }

        // Handle delete laptop
        async function handleDeleteLaptop(laptopId) {
            if (!confirm('Are you sure you want to remove this laptop?')) return;

            try {
                const response = await api.deleteUserLaptop(user.uid, laptopId);
                if (response.success) {
                    loadUserData(); // Reload
                }
            } catch (error) {
                console.error('Error deleting laptop:', error);
                alert('Failed to remove laptop. Please try again.');
            }
        }

        // Load auth state for navbar
        function loadAuthState() {
            const authSection = document.getElementById('authSection');
            if (user) {
                authSection.innerHTML = `
                    <a href="profile.html" class="navbar-user active">
                        <div class="navbar-user-avatar">${user.name?.[0]?.toUpperCase() || 'U'}</div>
                        <span>${user.name || 'User'}</span>
                    </a>
                `;
            }
        }

        // Initialize
        if (checkAuth()) {
            loadAuthState();
            loadUserData();
        }
    </script>

    <style>
        /* Profile Page Styles */
        .profile-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem;
        }

        .profile-header {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            margin-bottom: 3rem;
            padding-bottom: 2rem;
            border-bottom: 1px solid var(--border);
        }

        .profile-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .profile-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .profile-avatar span {
            font-size: 2rem;
            font-weight: 700;
            color: white;
        }

        .profile-info {
            flex: 1;
        }

        .profile-info h1 {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 0.25rem;
        }

        .profile-info p {
            color: var(--text-muted);
        }

        .profile-section {
            margin-bottom: 2rem;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .section-header h2 {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .section-header h2 i {
            color: var(--primary);
        }

        .laptops-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1rem;
        }

        .user-laptop-card {
            display: flex;
            align-items: flex-start;
            gap: 1rem;
            padding: 1.25rem;
            background: var(--surface);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
        }

        .laptop-card-content {
            flex: 1;
        }

        .laptop-card-content h4 {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0.75rem;
        }

        .laptop-specs {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .laptop-specs span {
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
            padding: 0.25rem 0.5rem;
            background: var(--bg-alt);
            border-radius: var(--radius-sm);
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .laptop-specs span i {
            font-size: 0.65rem;
            color: var(--text-muted);
        }

        .btn-icon {
            padding: 0.5rem;
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            border-radius: var(--radius-md);
            transition: all 0.2s ease;
        }

        .btn-icon:hover {
            background: var(--error);
            color: white;
        }

        .empty-laptops {
            text-align: center;
            padding: 3rem;
            background: var(--surface);
            border-radius: var(--radius-lg);
        }

        .empty-laptops i {
            font-size: 3rem;
            color: var(--text-muted);
            margin-bottom: 1rem;
        }

        .empty-laptops h3 {
            font-size: 1.25rem;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }

        .empty-laptops p {
            color: var(--text-muted);
        }

        /* Modal */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal.active {
            display: flex;
        }

        .modal-backdrop {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
        }

        .modal-content {
            position: relative;
            width: 100%;
            max-width: 500px;
            background: var(--surface);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-xl);
            margin: 1rem;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid var(--border);
        }

        .modal-header h3 {
            font-size: 1.125rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            color: var(--text-muted);
            cursor: pointer;
        }

        .modal-body {
            padding: 1.5rem;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .form-actions {
            display: flex;
            justify-content: flex-end;
            gap: 0.75rem;
            margin-top: 1.5rem;
        }

        .required {
            color: var(--error);
        }

        .form-group {
            position: relative;
        }

        .autocomplete-dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-lg);
            z-index: 50;
            max-height: 200px;
            overflow-y: auto;
            display: none;
        }

        .autocomplete-dropdown.active {
            display: block;
        }

        .autocomplete-item {
            padding: 0.75rem 1rem;
            cursor: pointer;
            font-size: 0.9rem;
            color: var(--text-primary);
        }

        .autocomplete-item:hover {
            background: var(--bg-alt);
        }

        .autocomplete-empty {
            padding: 0.75rem 1rem;
            color: var(--text-muted);
            font-size: 0.875rem;
        }

        /* Loading State */
        .loading-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 50vh;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 1rem;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @media (max-width: 768px) {
            .profile-header {
                flex-direction: column;
                text-align: center;
            }

            .profile-header .btn {
                width: 100%;
            }

            .laptops-grid {
                grid-template-columns: 1fr;
            }

            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</body>

</html>
