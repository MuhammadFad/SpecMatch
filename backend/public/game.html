<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Details - SpecMatch</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="public/styles/main.css">
    <link rel="stylesheet" href="public/styles/details.css">
</head>

<body>
    <div class="page-wrapper">
        <!-- Navigation -->
        <nav class="navbar">
            <div class="navbar-container">
                <a href="index.html" class="navbar-brand">
                    <i class="fas fa-laptop"></i>
                    <span>SpecMatch</span>
                </a>
                <div class="navbar-menu">
                    <a href="index.html" class="navbar-link">Home</a>
                    <a href="laptops.html" class="navbar-link">Laptops</a>
                    <a href="games.html" class="navbar-link">Games</a>
                </div>
                <div class="navbar-actions" id="authSection"></div>
            </div>
        </nav>

        <main class="main-content">
            <div class="details-container" id="gameDetails">
                <div class="loading-state">
                    <div class="spinner"></div>
                    <p>Loading game details...</p>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { api } from './public/scripts/api.js';
        import { getSteamHeaderImage, getVerdictClass, getUrlParams } from './public/scripts/utils.js';

        // State
        let game = null;
        let user = null;

        const container = document.getElementById('gameDetails');

        // Get appId from URL
        function getAppId() {
            const params = getUrlParams();
            return params.appId;
        }

        // Load game data
        async function loadGame() {
            const appId = getAppId();
            if (!appId) {
                container.innerHTML = `
                    <div class="error-state">
                        <i class="fas fa-exclamation-circle"></i>
                        <p>No game specified</p>
                        <a href="games.html" class="btn btn-primary">Browse Games</a>
                    </div>
                `;
                return;
            }

            try {
                const response = await api.getGameByAppId(appId);

                if (response.success && response.data) {
                    game = response.data;
                    document.title = `${game.name} - SpecMatch`;
                    renderGame();

                    // Check user's laptops compatibility if logged in
                    if (user) {
                        checkUserLaptopsCompatibility();
                    }
                } else {
                    throw new Error('Game not found');
                }
            } catch (error) {
                console.error('Error loading game:', error);
                container.innerHTML = `
                    <div class="error-state">
                        <i class="fas fa-exclamation-circle"></i>
                        <p>Game not found</p>
                        <a href="games.html" class="btn btn-primary">Browse Games</a>
                    </div>
                `;
            }
        }

        // Render game
        function renderGame() {
            const g = game;

            container.innerHTML = `
                <!-- Breadcrumb -->
                <nav class="breadcrumb">
                    <a href="index.html">Home</a>
                    <i class="fas fa-chevron-right"></i>
                    <a href="games.html">Games</a>
                    <i class="fas fa-chevron-right"></i>
                    <span>${g.name}</span>
                </nav>

                <!-- Game Header -->
                <div class="game-header-section">
                    <div class="game-header-bg" style="background-image: url('${getSteamHeaderImage(g.steam_appid)}')"></div>
                    <div class="game-header-overlay"></div>
                    <div class="game-header-content-box">
                        <img src="${getSteamHeaderImage(g.steam_appid)}" 
                             alt="${g.name}" 
                             class="game-poster-large"
                             onerror="this.onerror=null; this.src='https://placehold.co/460x215?text=No+Image'">
                        <div class="game-header-details">
                            <h1 class="game-title-large">${g.name}</h1>
                            <div class="game-meta-row">
                                ${g.release_date?.date ? `
                                    <span><i class="fas fa-calendar-alt"></i> ${g.release_date.date}</span>
                                ` : ''}
                                ${g.developers?.length > 0 ? `
                                    <span><i class="fas fa-code"></i> ${g.developers.join(', ')}</span>
                                ` : ''}
                                ${g.publishers?.length > 0 ? `
                                    <span><i class="fas fa-building"></i> ${g.publishers.join(', ')}</span>
                                ` : ''}
                            </div>
                            ${g.genres?.length > 0 ? `
                                <div class="game-genres">
                                    ${g.genres.map(genre => `
                                        <span class="genre-tag">${genre.description || genre}</span>
                                    `).join('')}
                                </div>
                            ` : ''}
                        </div>
                    </div>
                </div>

                <!-- User Laptops Compatibility Section (if logged in) -->
                <div class="user-compat-section" id="userCompatSection">
                    ${user ? `
                        <div class="section-loading">
                            <div class="spinner-sm"></div>
                            <span>Checking your laptops...</span>
                        </div>
                    ` : `
                        <div class="login-prompt">
                            <i class="fas fa-user-lock"></i>
                            <div>
                                <h4>Check Your Laptop's Compatibility</h4>
                                <p>Sign in to see if your registered laptops can run this game</p>
                            </div>
                            <a href="login.html" class="btn btn-primary btn-sm">Sign In</a>
                        </div>
                    `}
                </div>

                <!-- Action Buttons -->
                <div class="action-buttons">
                    <a href="laptops.html?gameId=${g.steam_appid}&gameName=${encodeURIComponent(g.name)}" class="btn btn-primary btn-lg">
                        <i class="fas fa-laptop"></i>
                        Find Laptops That Can Run This Game
                    </a>
                    ${g.steam_appid ? `
                        <a href="https://store.steampowered.com/app/${g.steam_appid}" 
                           target="_blank" 
                           rel="noopener noreferrer" 
                           class="btn btn-secondary btn-lg">
                            <i class="fab fa-steam"></i>
                            View on Steam
                        </a>
                    ` : ''}
                </div>

                <!-- Game Description -->
                ${g.short_description || g.detailed_description ? `
                    <div class="game-description-section">
                        <h3>About This Game</h3>
                        <div class="game-description">
                            ${g.short_description || ''}
                        </div>
                    </div>
                ` : ''}

                <!-- System Requirements -->
                <div class="requirements-section">
                    <h3>System Requirements</h3>
                    <div class="requirements-grid">
                        ${renderRequirements('minimum', g.pc_requirements?.minimum, g.requirements?.minimum)}
                        ${renderRequirements('recommended', g.pc_requirements?.recommended, g.requirements?.recommended)}
                    </div>
                </div>

                <!-- Categories & Tags -->
                ${g.categories?.length > 0 || g.tags?.length > 0 ? `
                    <div class="game-tags-section">
                        ${g.categories?.length > 0 ? `
                            <div class="tags-group">
                                <h4>Features</h4>
                                <div class="tags-list">
                                    ${g.categories.map(cat => `
                                        <span class="feature-tag">
                                            <i class="fas fa-check"></i> ${cat.description || cat}
                                        </span>
                                    `).join('')}
                                </div>
                            </div>
                        ` : ''}
                        ${g.tags?.length > 0 ? `
                            <div class="tags-group">
                                <h4>Tags</h4>
                                <div class="tags-list">
                                    ${g.tags.slice(0, 15).map(tag => `
                                        <span class="game-tag">${tag}</span>
                                    `).join('')}
                                </div>
                            </div>
                        ` : ''}
                    </div>
                ` : ''}
            `;
        }

        // Render requirements - handles both raw HTML (pc_requirements) and parsed object (requirements)
        function renderRequirements(type, htmlRequirements, parsedRequirements) {
            // Check if we have any requirements data
            const hasHtml = htmlRequirements && typeof htmlRequirements === 'string' && htmlRequirements.trim().length > 0;
            const hasParsed = parsedRequirements && (parsedRequirements.cpu_text || parsedRequirements.gpu_text || parsedRequirements.ram_gb);

            if (!hasHtml && !hasParsed) {
                return `
                    <div class="requirements-card ${type}">
                        <h4>
                            <i class="fas fa-${type === 'minimum' ? 'exclamation-circle' : 'check-circle'}"></i>
                            ${type === 'minimum' ? 'Minimum' : 'Recommended'}
                        </h4>
                        <p class="no-requirements">Requirements not available</p>
                    </div>
                `;
            }

            // If we have raw HTML, parse it for display
            let parsed = {};
            if (hasHtml) {
                parsed = parseRequirements(htmlRequirements);
            }

            // If HTML parsing didn't get results, use the parsed object from DB
            if (!parsed.processor && parsedRequirements?.cpu_text) {
                parsed.processor = parsedRequirements.cpu_text;
            }
            if (!parsed.graphics && parsedRequirements?.gpu_text) {
                parsed.graphics = parsedRequirements.gpu_text;
            }
            if (!parsed.memory && parsedRequirements?.ram_gb) {
                parsed.memory = `${parsedRequirements.ram_gb} GB RAM`;
            }
            if (!parsed.storage && parsedRequirements?.storage_gb) {
                parsed.storage = `${parsedRequirements.storage_gb} GB available space`;
            }

            return `
                <div class="requirements-card ${type}">
                    <h4>
                        <i class="fas fa-${type === 'minimum' ? 'exclamation-circle' : 'check-circle'}"></i>
                        ${type === 'minimum' ? 'Minimum' : 'Recommended'}
                    </h4>
                    <div class="requirements-list">
                        ${parsed.os ? `
                            <div class="requirement-item">
                                <span class="req-label"><i class="fab fa-windows"></i> OS</span>
                                <span class="req-value">${parsed.os}</span>
                            </div>
                        ` : ''}
                        ${parsed.processor ? `
                            <div class="requirement-item">
                                <span class="req-label"><i class="fas fa-microchip"></i> Processor</span>
                                <span class="req-value">${parsed.processor}</span>
                            </div>
                        ` : ''}
                        ${parsed.memory ? `
                            <div class="requirement-item">
                                <span class="req-label"><i class="fas fa-memory"></i> Memory</span>
                                <span class="req-value">${parsed.memory}</span>
                            </div>
                        ` : ''}
                        ${parsed.graphics ? `
                            <div class="requirement-item">
                                <span class="req-label"><i class="fas fa-tv"></i> Graphics</span>
                                <span class="req-value">${parsed.graphics}</span>
                            </div>
                        ` : ''}
                        ${parsed.storage ? `
                            <div class="requirement-item">
                                <span class="req-label"><i class="fas fa-hdd"></i> Storage</span>
                                <span class="req-value">${parsed.storage}</span>
                            </div>
                        ` : ''}
                        ${parsed.directx ? `
                            <div class="requirement-item">
                                <span class="req-label"><i class="fas fa-cube"></i> DirectX</span>
                                <span class="req-value">${parsed.directx}</span>
                            </div>
                        ` : ''}
                    </div>
                </div>
            `;
        }

        // Parse Steam HTML requirements
        function parseRequirements(html) {
            const result = {};

            // Create a temporary element to parse HTML
            const temp = document.createElement('div');
            temp.innerHTML = html;

            // Extract text content
            const text = temp.textContent || temp.innerText;

            // List of all field names to use as stop boundaries
            const fieldNames = ['OS', 'Processor', 'Memory', 'Graphics', 'DirectX', 'Network', 'Storage', 'Hard Drive', 'Sound', 'Additional Notes', 'VR Support'];

            // Create a stop pattern that matches any of these field names followed by colon
            const stopPattern = fieldNames.map(f => f.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '\\s*:').join('|');

            // Helper function to extract a field value that stops at the next field
            function extractField(fieldName) {
                // Create regex that captures content after fieldName: until the next field or end
                const regex = new RegExp(
                    fieldName + '\\s*:\\s*(.+?)(?=' + stopPattern + '|$)',
                    'i'
                );
                const match = text.match(regex);
                if (match && match[1]) {
                    return match[1].trim();
                }
                return '';
            }

            // Extract each field
            result.os = extractField('OS');
            result.processor = extractField('Processor');
            result.memory = extractField('Memory');
            result.graphics = extractField('Graphics');
            result.storage = extractField('Storage') || extractField('Hard Drive');
            result.directx = extractField('DirectX');

            return result;
        }

        // Check user laptops compatibility
        async function checkUserLaptopsCompatibility() {
            const section = document.getElementById('userCompatSection');

            try {
                const response = await api.checkMyLaptopCompatibility(game.steam_appid);

                if (response.success && response.data?.results?.length > 0) {
                    const results = response.data.results;

                    section.innerHTML = `
                        <div class="user-compat-header">
                            <h3><i class="fas fa-laptop"></i> Your Laptops</h3>
                            <span class="laptop-count">${results.length} laptop${results.length > 1 ? 's' : ''} checked</span>
                        </div>
                        <div class="user-compat-grid">
                            ${results.map(result => `
                                <div class="user-laptop-compat-card">
                                    <div class="laptop-card-header">
                                        <div class="verdict-badge ${getVerdictClass(result.verdict)}">
                                            ${getVerdictIcon(result.verdict)}
                                            ${result.verdict}
                                        </div>
                                    </div>
                                    <div class="laptop-card-body">
                                        <h4 class="laptop-card-name">${result.laptop?.name || 'Your Laptop'}</h4>
                                        <div class="laptop-card-specs">
                                            ${result.laptop?.cpu?.name ? `<span>${truncateSpec(result.laptop.cpu.name)}</span>` : ''}
                                            ${result.laptop?.gpu?.name ? `<span>${truncateSpec(result.laptop.gpu.name)}</span>` : ''}
                                            ${result.laptop?.ram?.size_gb ? `<span>${result.laptop.ram.size_gb}GB RAM</span>` : ''}
                                        </div>
                                    </div>
                                    ${result.laptop?.slug ? `
                                        <a href="laptop.html?slug=${result.laptop.slug}" class="laptop-card-link">
                                            View Details <i class="fas fa-arrow-right"></i>
                                        </a>
                                    ` : ''}
                                </div>
                            `).join('')}
                        </div>
                    `;
                } else {
                    section.innerHTML = `
                        <div class="no-laptops-prompt">
                            <i class="fas fa-laptop-medical"></i>
                            <div>
                                <h4>No Laptops Registered</h4>
                                <p>Add your laptop specs to check compatibility with this game</p>
                            </div>
                            <a href="profile.html" class="btn btn-secondary btn-sm">Add Laptop</a>
                        </div>
                    `;
                }
            } catch (error) {
                console.error('Error checking compatibility:', error);
                section.innerHTML = `
                    <div class="compat-error">
                        <i class="fas fa-exclamation-triangle"></i>
                        <span>Unable to check compatibility</span>
                    </div>
                `;
            }
        }

        function getVerdictIcon(verdict) {
            const icons = {
                'Excellent': '<i class="fas fa-star"></i>',
                'Recommended': '<i class="fas fa-check-circle"></i>',
                'Playable': '<i class="fas fa-check"></i>',
                'Minimum': '<i class="fas fa-minus-circle"></i>',
                'Insufficient': '<i class="fas fa-times-circle"></i>'
            };
            return icons[verdict] || '<i class="fas fa-question-circle"></i>';
        }

        function truncateSpec(name) {
            return name.replace(/Intel Core |AMD Ryzen |NVIDIA GeForce |AMD Radeon /gi, '')
                .split(' ')
                .slice(0, 3)
                .join(' ');
        }

        // Load auth state
        function loadAuthState() {
            user = JSON.parse(localStorage.getItem('specmatch_user'));
            const authSection = document.getElementById('authSection');

            if (user) {
                authSection.innerHTML = `
                    <a href="profile.html" class="navbar-user">
                        <div class="navbar-user-avatar">${user.name?.[0]?.toUpperCase() || 'U'}</div>
                        <span>${user.name || 'User'}</span>
                    </a>
                `;
            } else {
                authSection.innerHTML = `
                    <a href="login.html" class="btn btn-ghost">Sign In</a>
                    <a href="signup.html" class="btn btn-primary btn-sm">Sign Up</a>
                `;
            }
        }

        // Initialize
        loadAuthState();
        loadGame();
    </script>

    <style>
