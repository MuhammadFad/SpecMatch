<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpecMatch - Compatibility Check</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="dashboard.css">
    <style>
        .compat-container {
            max-width: 900px;
            margin: 2rem auto;
            padding: 0 1rem;
        }
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1.5rem;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: var(--text-primary);
            cursor: pointer;
            margin-bottom: 1.5rem;
            transition: all 0.3s ease;
        }
        .back-btn:hover {
            background: var(--accent-primary);
        }
        .game-header {
            display: flex;
            gap: 2rem;
            padding: 2rem;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            margin-bottom: 2rem;
        }
        .game-image {
            width: 300px;
            border-radius: 12px;
            overflow: hidden;
        }
        .game-image img {
            width: 100%;
            height: auto;
        }
        .game-info h1 {
            font-size: 2rem;
            margin-bottom: 1rem;
            color: var(--text-primary);
        }
        .game-info p {
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }
        .verdict-card {
            padding: 2rem;
            border-radius: 16px;
            text-align: center;
            margin-bottom: 2rem;
        }
        .verdict-card.excellent {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.2), rgba(16, 185, 129, 0.1));
            border: 2px solid #10b981;
        }
        .verdict-card.good {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.2), rgba(59, 130, 246, 0.1));
            border: 2px solid #3b82f6;
        }
        .verdict-card.playable {
            background: linear-gradient(135deg, rgba(245, 158, 11, 0.2), rgba(245, 158, 11, 0.1));
            border: 2px solid #f59e0b;
        }
        .verdict-card.struggle {
            background: linear-gradient(135deg, rgba(249, 115, 22, 0.2), rgba(249, 115, 22, 0.1));
            border: 2px solid #f97316;
        }
        .verdict-card.unplayable {
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.2), rgba(239, 68, 68, 0.1));
            border: 2px solid #ef4444;
        }
        .verdict-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }
        .verdict-card.excellent .verdict-icon { color: #10b981; }
        .verdict-card.good .verdict-icon { color: #3b82f6; }
        .verdict-card.playable .verdict-icon { color: #f59e0b; }
        .verdict-card.struggle .verdict-icon { color: #f97316; }
        .verdict-card.unplayable .verdict-icon { color: #ef4444; }
        .verdict-text {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }
        .verdict-score {
            font-size: 1.2rem;
            color: var(--text-secondary);
        }
        .specs-comparison {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        .spec-card {
            padding: 1.5rem;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
        }
        .spec-card h3 {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1rem;
            color: var(--text-primary);
        }
        .spec-bar {
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            overflow: hidden;
            margin: 0.5rem 0;
        }
        .spec-bar-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.5s ease;
        }
        .spec-bar-fill.meets { background: linear-gradient(90deg, #10b981, #34d399); }
        .spec-bar-fill.close { background: linear-gradient(90deg, #f59e0b, #fbbf24); }
        .spec-bar-fill.below { background: linear-gradient(90deg, #ef4444, #f87171); }
        .spec-values {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }
        .bottleneck-card {
            padding: 1.5rem;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 12px;
            margin-bottom: 2rem;
        }
        .bottleneck-card h3 {
            color: #ef4444;
            margin-bottom: 0.5rem;
        }
        .loading-compat {
            text-align: center;
            padding: 4rem;
        }
        .loading-compat i {
            font-size: 3rem;
            color: var(--accent-primary);
            margin-bottom: 1rem;
        }
        @media (max-width: 768px) {
            .game-header { flex-direction: column; }
            .game-image { width: 100%; }
            .specs-comparison { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-brand">
            <i class="fas fa-laptop"></i>
            <span>SpecMatch</span>
        </div>
        <div class="nav-right">
            <div class="user-info">
                <i class="fas fa-user-circle"></i>
                <span id="userName">User</span>
            </div>
        </div>
    </nav>

    <div class="compat-container">
        <button class="back-btn" onclick="goBack()">
            <i class="fas fa-arrow-left"></i> Back to Dashboard
        </button>

        <div id="compatContent">
            <div class="loading-compat">
                <i class="fas fa-spinner fa-spin"></i>
                <p>Checking compatibility...</p>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCywnIfR3dhZAWLT-1Nn6iz_6BCBgipLqE",
            authDomain: "specmatch-auth.firebaseapp.com",
            projectId: "specmatch-auth",
            storageBucket: "specmatch-auth.firebasestorage.app",
            messagingSenderId: "170230638392",
            appId: "1:170230638392:web:b321a6925f740afd16c3cd"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                document.getElementById("userName").textContent = user.displayName || user.email.split('@')[0];
                
                // Get user's laptop
                const userRes = await fetch(`http://localhost:5000/get-user/${user.uid}`);
                const userData = await userRes.json();
                
                if (userData.success && userData.user?.currentLaptop) {
                    window.userLaptop = userData.user.currentLaptop;
                    window.userId = user.uid;
                    checkGameCompatibility();
                } else {
                    showNoLaptopError();
                }
            } else {
                window.location.href = "login.html";
            }
        });

        window.goBack = () => {
            window.location.href = "dashboard.html";
        };
    </script>

    <script>
        function showNoLaptopError() {
            document.getElementById('compatContent').innerHTML = `
                <div class="verdict-card unplayable">
                    <div class="verdict-icon"><i class="fas fa-exclamation-triangle"></i></div>
                    <div class="verdict-text">No Laptop Configured</div>
                    <p>Please set up your laptop specs in the dashboard first.</p>
                    <button class="back-btn" onclick="goBack()" style="margin-top: 1rem;">
                        <i class="fas fa-cog"></i> Configure Laptop
                    </button>
                </div>
            `;
        }

        async function checkGameCompatibility() {
            const gameData = JSON.parse(localStorage.getItem('checkGame'));
            if (!gameData) {
                document.getElementById('compatContent').innerHTML = `
                    <div class="verdict-card unplayable">
                        <div class="verdict-icon"><i class="fas fa-question-circle"></i></div>
                        <div class="verdict-text">No Game Selected</div>
                        <p>Please select a game from the dashboard.</p>
                    </div>
                `;
                return;
            }

            try {
                let gameId = gameData.gameId;
                let gameInfo = null;

                // If game is from Steam lookup (not DB), fetch details first
                if (!gameData.fromDB && gameData.appid) {
                    const fetchRes = await fetch('http://localhost:3000/api/games/fetch-details', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ appid: gameData.appid })
                    });
                    const fetchData = await fetchRes.json();
                    if (fetchData.success && fetchData.data) {
                        gameId = fetchData.data._id;
                        gameInfo = fetchData.data;
                    } else {
                        throw new Error('Could not fetch game details');
                    }
                } else {
                    // Fetch game info from DB
                    const gameRes = await fetch(`http://localhost:3000/api/games/${gameId}`);
                    const gameResData = await gameRes.json();
                    if (gameResData.success) {
                        gameInfo = gameResData.data;
                    }
                }

                // For now, simulate compatibility based on user laptop specs
                // In production, this would call the compatibility API
                displayCompatibilityResult(gameInfo, gameData.name);

            } catch (err) {
                console.error('Error checking compatibility:', err);
                document.getElementById('compatContent').innerHTML = `
                    <div class="verdict-card unplayable">
                        <div class="verdict-icon"><i class="fas fa-times-circle"></i></div>
                        <div class="verdict-text">Error</div>
                        <p>${err.message}</p>
                    </div>
                `;
            }
        }

        function displayCompatibilityResult(game, gameName) {
            const userLaptop = window.userLaptop || {};
            
            // Calculate compatibility scores
            const minReqs = game?.requirements?.minimum || {};
            const recReqs = game?.requirements?.recommended || {};
            
            // Simple scoring based on RAM comparison
            const userRam = parseInt(userLaptop.ram) || 8;
            const reqRam = minReqs.ram_gb || 8;
            const reqStorage = minReqs.storage_gb || 50;
            
            let score = 0;
            let verdict = 'unplayable';
            let verdictIcon = 'fa-times-circle';
            
            if (userRam >= (recReqs.ram_gb || reqRam * 1.5)) {
                score = 90;
                verdict = 'excellent';
                verdictIcon = 'fa-check-circle';
            } else if (userRam >= reqRam) {
                score = 70;
                verdict = 'good';
                verdictIcon = 'fa-thumbs-up';
            } else if (userRam >= reqRam * 0.8) {
                score = 50;
                verdict = 'playable';
                verdictIcon = 'fa-minus-circle';
            } else if (userRam >= reqRam * 0.5) {
                score = 30;
                verdict = 'struggle';
                verdictIcon = 'fa-exclamation-circle';
            } else {
                score = 10;
                verdict = 'unplayable';
                verdictIcon = 'fa-times-circle';
            }

            const steamAppId = game?.steam_app_id || 0;
            const imageUrl = game?.image || `https://cdn.cloudflare.steamstatic.com/steam/apps/${steamAppId}/header.jpg`;

            document.getElementById('compatContent').innerHTML = `
                <div class="game-header">
                    <div class="game-image">
                        <img src="${imageUrl}" alt="${gameName}" onerror="this.src='https://via.placeholder.com/300x140?text=Game'">
                    </div>
                    <div class="game-info">
                        <h1>${gameName}</h1>
                        <p><i class="fas fa-memory"></i> Min RAM: ${reqRam} GB</p>
                        <p><i class="fas fa-hdd"></i> Storage: ${reqStorage} GB</p>
                        <p><i class="fas fa-microchip"></i> Min CPU Score: ${minReqs.cpu_score || 'N/A'}</p>
                        <p><i class="fas fa-tv"></i> Min GPU Score: ${minReqs.gpu_score || 'N/A'}</p>
                    </div>
                </div>

                <div class="verdict-card ${verdict}">
                    <div class="verdict-icon"><i class="fas ${verdictIcon}"></i></div>
                    <div class="verdict-text">${verdict.charAt(0).toUpperCase() + verdict.slice(1)}</div>
                    <div class="verdict-score">Compatibility Score: ${score}/100</div>
                </div>

                <h2 style="margin-bottom: 1rem; color: var(--text-primary);"><i class="fas fa-chart-bar"></i> Specs Comparison</h2>
                <div class="specs-comparison">
                    <div class="spec-card">
                        <h3><i class="fas fa-memory"></i> RAM</h3>
                        <div class="spec-bar">
                            <div class="spec-bar-fill ${userRam >= reqRam ? 'meets' : userRam >= reqRam * 0.8 ? 'close' : 'below'}" 
                                 style="width: ${Math.min(100, (userRam / reqRam) * 100)}%"></div>
                        </div>
                        <div class="spec-values">
                            <span>Your PC: ${userRam} GB</span>
                            <span>Required: ${reqRam} GB</span>
                        </div>
                    </div>
                    <div class="spec-card">
                        <h3><i class="fas fa-hdd"></i> Storage</h3>
                        <div class="spec-bar">
                            <div class="spec-bar-fill meets" style="width: 100%"></div>
                        </div>
                        <div class="spec-values">
                            <span>Your PC: ${userLaptop.ssd || '512GB'}</span>
                            <span>Required: ${reqStorage} GB</span>
                        </div>
                    </div>
                    <div class="spec-card">
                        <h3><i class="fas fa-microchip"></i> Processor</h3>
                        <div class="spec-bar">
                            <div class="spec-bar-fill ${verdict === 'excellent' || verdict === 'good' ? 'meets' : 'close'}" 
                                 style="width: ${score}%"></div>
                        </div>
                        <div class="spec-values">
                            <span>Your PC: ${userLaptop.core || 'Unknown'}</span>
                            <span>Required: ${minReqs.cpu_text || 'N/A'}</span>
                        </div>
                    </div>
                    <div class="spec-card">
                        <h3><i class="fas fa-tv"></i> Graphics</h3>
                        <div class="spec-bar">
                            <div class="spec-bar-fill ${verdict === 'excellent' || verdict === 'good' ? 'meets' : 'close'}" 
                                 style="width: ${score}%"></div>
                        </div>
                        <div class="spec-values">
                            <span>Your PC: ${userLaptop.graphicsCard || 'Integrated'}</span>
                            <span>Required: ${minReqs.gpu_text || 'N/A'}</span>
                        </div>
                    </div>
                </div>

                ${verdict === 'struggle' || verdict === 'unplayable' ? `
                <div class="bottleneck-card">
                    <h3><i class="fas fa-exclamation-triangle"></i> Bottleneck Detected</h3>
                    <p>Your system may struggle to run this game. Consider upgrading your RAM or GPU for better performance.</p>
                    <button class="back-btn" onclick="window.location.href='best-laptops.html'" style="margin-top: 1rem;">
                        <i class="fas fa-laptop"></i> Find Best Laptops for this Game
                    </button>
                </div>
                ` : ''}
            `;
        }
    </script>
</body>
</html>
