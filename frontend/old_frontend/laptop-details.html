<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpecMatch - Laptop Details</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="dashboard.css">
    <style>
        .details-container {
            max-width: 1100px;
            margin: 2rem auto;
            padding: 0 1rem;
        }
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1.5rem;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: var(--text-primary);
            cursor: pointer;
            margin-bottom: 1.5rem;
            transition: all 0.3s ease;
        }
        .back-btn:hover {
            background: var(--accent-primary);
        }
        .laptop-hero {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            margin-bottom: 2rem;
        }
        .laptop-gallery {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 1.5rem;
        }
        .main-image {
            width: 100%;
            height: 350px;
            object-fit: contain;
            border-radius: 12px;
            background: rgba(255,255,255,0.05);
            margin-bottom: 1rem;
        }
        .thumbnail-row {
            display: flex;
            gap: 0.5rem;
            overflow-x: auto;
        }
        .thumbnail {
            width: 80px;
            height: 60px;
            object-fit: cover;
            border-radius: 8px;
            cursor: pointer;
            opacity: 0.6;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }
        .thumbnail:hover, .thumbnail.active {
            opacity: 1;
            border-color: var(--accent-primary);
        }
        .laptop-info {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 2rem;
        }
        .laptop-brand {
            color: var(--accent-primary);
            font-size: 0.9rem;
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }
        .laptop-name {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 1rem;
            line-height: 1.3;
        }
        .laptop-score {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
            padding: 1rem;
            background: rgba(139, 92, 246, 0.1);
            border-radius: 12px;
        }
        .score-circle {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: conic-gradient(var(--accent-primary) var(--score-percent), rgba(255,255,255,0.1) 0);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .score-circle::before {
            content: '';
            position: absolute;
            width: 55px;
            height: 55px;
            background: var(--bg-primary);
            border-radius: 50%;
        }
        .score-value {
            position: relative;
            z-index: 1;
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text-primary);
        }
        .score-label {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        .score-label strong {
            display: block;
            color: var(--text-primary);
            font-size: 1.1rem;
        }
        .laptop-price {
            font-size: 2.2rem;
            font-weight: 700;
            color: var(--accent-primary);
            margin-bottom: 1.5rem;
        }
        .laptop-price small {
            font-size: 0.9rem;
            color: var(--text-secondary);
            font-weight: 400;
        }
        .action-buttons {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .btn-primary {
            flex: 1;
            padding: 1rem;
            background: var(--accent-primary);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        .btn-primary:hover {
            background: var(--accent-secondary);
        }
        .btn-secondary {
            flex: 1;
            padding: 1rem;
            background: transparent;
            border: 2px solid var(--glass-border);
            border-radius: 12px;
            color: var(--text-primary);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        .btn-secondary:hover {
            border-color: var(--accent-primary);
            color: var(--accent-primary);
        }
        .specs-section {
            margin-top: 2rem;
        }
        .section-title {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 1.3rem;
            color: var(--text-primary);
            margin-bottom: 1.5rem;
        }
        .specs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
        }
        .spec-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 1.5rem;
        }
        .spec-card-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1rem;
        }
        .spec-card-header i {
            font-size: 1.5rem;
            color: var(--accent-primary);
        }
        .spec-card-header h3 {
            color: var(--text-primary);
            font-size: 1rem;
        }
        .spec-main {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }
        .spec-details {
            color: var(--text-secondary);
            font-size: 0.85rem;
            line-height: 1.6;
        }
        .spec-score-bar {
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            margin-top: 0.75rem;
            overflow: hidden;
        }
        .spec-score-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary));
            border-radius: 3px;
        }
        .loading-state {
            text-align: center;
            padding: 4rem;
        }
        .loading-state i {
            font-size: 3rem;
            color: var(--accent-primary);
            margin-bottom: 1rem;
        }
        @media (max-width: 768px) {
            .laptop-hero { grid-template-columns: 1fr; }
            .main-image { height: 250px; }
            .action-buttons { flex-direction: column; }
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-brand">
            <i class="fas fa-laptop"></i>
            <span>SpecMatch</span>
        </div>
        <div class="nav-right">
            <div class="user-info">
                <i class="fas fa-user-circle"></i>
                <span id="userName">User</span>
            </div>
        </div>
    </nav>

    <div class="details-container">
        <button class="back-btn" onclick="goBack()">
            <i class="fas fa-arrow-left"></i> Back
        </button>

        <div id="laptopContent">
            <div class="loading-state">
                <i class="fas fa-spinner fa-spin"></i>
                <p>Loading laptop details...</p>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCywnIfR3dhZAWLT-1Nn6iz_6BCBgipLqE",
            authDomain: "specmatch-auth.firebaseapp.com",
            projectId: "specmatch-auth",
            storageBucket: "specmatch-auth.firebasestorage.app",
            messagingSenderId: "170230638392",
            appId: "1:170230638392:web:b321a6925f740afd16c3cd"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById("userName").textContent = user.displayName || user.email.split('@')[0];
                loadLaptopDetails();
            } else {
                window.location.href = "login.html";
            }
        });

        window.goBack = () => {
            history.back();
        };
    </script>

    <script>
        async function loadLaptopDetails() {
            const urlParams = new URLSearchParams(window.location.search);
            const laptopId = urlParams.get('id');

            if (!laptopId) {
                document.getElementById('laptopContent').innerHTML = `
                    <div class="loading-state">
                        <i class="fas fa-exclamation-circle"></i>
                        <p>No laptop ID provided.</p>
                    </div>
                `;
                return;
            }

            try {
                const res = await fetch(`http://localhost:3000/api/laptops/${laptopId}`);
                const data = await res.json();

                if (data.success && data.data) {
                    displayLaptop(data.data);
                } else {
                    throw new Error('Laptop not found');
                }
            } catch (err) {
                console.error('Error loading laptop:', err);
                document.getElementById('laptopContent').innerHTML = `
                    <div class="loading-state">
                        <i class="fas fa-exclamation-circle"></i>
                        <p>Error: ${err.message}</p>
                    </div>
                `;
            }
        }

        function displayLaptop(laptop) {
            const price = laptop.pricing?.estimated_price_usd || 0;
            const finalScore = laptop.final_score || Math.round(((laptop.cpu?.score || 0) + (laptop.gpu?.score || 0) + (laptop.ram?.score || 0)) / 3);
            const images = laptop.images || [laptop.image || 'https://via.placeholder.com/500x350?text=Laptop'];

            document.getElementById('laptopContent').innerHTML = `
                <div class="laptop-hero">
                    <div class="laptop-gallery">
                        <img class="main-image" id="mainImage" src="${images[0]}" alt="${laptop.name}"
                             onerror="this.src='https://via.placeholder.com/500x350?text=Laptop'">
                        ${images.length > 1 ? `
                            <div class="thumbnail-row">
                                ${images.map((img, i) => `
                                    <img class="thumbnail ${i === 0 ? 'active' : ''}" src="${img}" 
                                         onclick="changeImage('${img}', this)"
                                         onerror="this.style.display='none'">
                                `).join('')}
                            </div>
                        ` : ''}
                    </div>
                    <div class="laptop-info">
                        <div class="laptop-brand">${laptop.brand || 'Unknown Brand'}</div>
                        <h1 class="laptop-name">${laptop.name || 'Laptop'}</h1>
                        
                        <div class="laptop-score">
                            <div class="score-circle" style="--score-percent: ${finalScore}%">
                                <span class="score-value">${finalScore}</span>
                            </div>
                            <div class="score-label">
                                <strong>Overall Score</strong>
                                Based on CPU, GPU, RAM & Storage performance
                            </div>
                        </div>

                        <div class="laptop-price">
                            $${price.toLocaleString()}
                            <small>Estimated Price</small>
                        </div>

                        <div class="action-buttons">
                            <button class="btn-primary" onclick="window.open('${laptop.product_url || '#'}', '_blank')">
                                <i class="fas fa-external-link-alt"></i> View on Store
                            </button>
                            <button class="btn-secondary" onclick="checkGameCompat('${laptop._id}')">
                                <i class="fas fa-gamepad"></i> Check Game Compatibility
                            </button>
                        </div>

                        <div style="color: var(--text-secondary); font-size: 0.9rem;">
                            <p><i class="fas fa-microchip"></i> ${laptop.cpu?.name || 'N/A'}</p>
                            <p><i class="fas fa-tv"></i> ${laptop.gpu?.name || 'Integrated Graphics'}</p>
                            <p><i class="fas fa-memory"></i> ${laptop.ram?.size_gb || '?'} GB ${laptop.ram?.type || ''} RAM</p>
                            <p><i class="fas fa-hdd"></i> ${laptop.storage?.capacity_gb || '?'} GB ${laptop.storage?.type || 'SSD'}</p>
                        </div>
                    </div>
                </div>

                <div class="specs-section">
                    <h2 class="section-title"><i class="fas fa-cogs"></i> Full Specifications</h2>
                    <div class="specs-grid">
                        <div class="spec-card">
                            <div class="spec-card-header">
                                <i class="fas fa-microchip"></i>
                                <h3>Processor (CPU)</h3>
                            </div>
                            <div class="spec-main">${laptop.cpu?.name || 'N/A'}</div>
                            <div class="spec-details">
                                Cores: ${laptop.cpu?.cores || '?'} | Threads: ${laptop.cpu?.threads || '?'}<br>
                                Base: ${laptop.cpu?.base_clock_ghz || '?'} GHz | Boost: ${laptop.cpu?.boost_clock_ghz || '?'} GHz<br>
                                TDP: ${laptop.cpu?.tdp_watts || '?'}W
                            </div>
                            <div class="spec-score-bar">
                                <div class="spec-score-fill" style="width: ${laptop.cpu?.score || 0}%"></div>
                            </div>
                        </div>

                        <div class="spec-card">
                            <div class="spec-card-header">
                                <i class="fas fa-tv"></i>
                                <h3>Graphics (GPU)</h3>
                            </div>
                            <div class="spec-main">${laptop.gpu?.name || 'Integrated'}</div>
                            <div class="spec-details">
                                VRAM: ${laptop.gpu?.vram_gb || '?'} GB<br>
                                TGP: ${laptop.gpu?.tgp_watts || '?'}W<br>
                                ${laptop.gpu?.integrated ? 'Integrated Graphics' : 'Dedicated GPU'}
                            </div>
                            <div class="spec-score-bar">
                                <div class="spec-score-fill" style="width: ${laptop.gpu?.score || 0}%"></div>
                            </div>
                        </div>

                        <div class="spec-card">
                            <div class="spec-card-header">
                                <i class="fas fa-memory"></i>
                                <h3>Memory (RAM)</h3>
                            </div>
                            <div class="spec-main">${laptop.ram?.size_gb || '?'} GB</div>
                            <div class="spec-details">
                                Type: ${laptop.ram?.type || 'DDR4'}<br>
                                Speed: ${laptop.ram?.frequency_mhz || '?'} MHz
                            </div>
                            <div class="spec-score-bar">
                                <div class="spec-score-fill" style="width: ${laptop.ram?.score || 0}%"></div>
                            </div>
                        </div>

                        <div class="spec-card">
                            <div class="spec-card-header">
                                <i class="fas fa-hdd"></i>
                                <h3>Storage</h3>
                            </div>
                            <div class="spec-main">${laptop.storage?.capacity_gb || '?'} GB ${laptop.storage?.type || 'SSD'}</div>
                            <div class="spec-details">
                                Read Speed: ${laptop.storage?.read_speed_mbps || '?'} MB/s
                            </div>
                            <div class="spec-score-bar">
                                <div class="spec-score-fill" style="width: ${laptop.storage?.score || 0}%"></div>
                            </div>
                        </div>

                        <div class="spec-card">
                            <div class="spec-card-header">
                                <i class="fas fa-desktop"></i>
                                <h3>Display</h3>
                            </div>
                            <div class="spec-main">${laptop.displays?.[0]?.size_inch || '?'}" ${laptop.displays?.[0]?.panel_type || ''}</div>
                            <div class="spec-details">
                                Resolution: ${laptop.displays?.[0]?.resolution_h || '?'} x ${laptop.displays?.[0]?.resolution_v || '?'}<br>
                                Refresh Rate: ${laptop.displays?.[0]?.refresh_rate_hz || '?'} Hz<br>
                                ${laptop.displays?.[0]?.touch ? '✓ Touchscreen' : 'No Touch'}
                            </div>
                        </div>

                        <div class="spec-card">
                            <div class="spec-card-header">
                                <i class="fas fa-battery-full"></i>
                                <h3>Battery & Chassis</h3>
                            </div>
                            <div class="spec-main">${laptop.battery?.capacity_wh || '?'} Wh</div>
                            <div class="spec-details">
                                Weight: ${laptop.chassis?.weight_kg || '?'} kg<br>
                                Thickness: ${laptop.chassis?.thickness_mm || '?'} mm
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function changeImage(src, element) {
            document.getElementById('mainImage').src = src;
            document.querySelectorAll('.thumbnail').forEach(t => t.classList.remove('active'));
            element.classList.add('active');
        }

        function checkGameCompat(laptopId) {
            localStorage.setItem('checkLaptop', laptopId);
            window.location.href = 'dashboard.html';
        }

        window.changeImage = changeImage;
        window.checkGameCompat = checkGameCompat;
    </script>
</body>
</html>
