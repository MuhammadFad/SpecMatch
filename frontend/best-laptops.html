<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpecMatch - Best Laptops for Game</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="dashboard.css">
    <style>
        .best-container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
        }
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1.5rem;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: var(--text-primary);
            cursor: pointer;
            margin-bottom: 1.5rem;
            transition: all 0.3s ease;
        }
        .back-btn:hover {
            background: var(--accent-primary);
        }
        .game-banner {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            padding: 1.5rem;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            margin-bottom: 2rem;
        }
        .game-banner img {
            width: 200px;
            border-radius: 8px;
        }
        .game-banner h1 {
            font-size: 1.8rem;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }
        .game-banner p {
            color: var(--text-secondary);
        }
        .section-title {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 1.5rem;
            color: var(--text-primary);
            margin-bottom: 1.5rem;
        }
        .laptops-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        .laptop-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        .laptop-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 40px rgba(139, 92, 246, 0.2);
        }
        .laptop-card.recommended {
            border: 2px solid #10b981;
            position: relative;
        }
        .laptop-card.recommended::before {
            content: '⭐ Best Match';
            position: absolute;
            top: 10px;
            right: 10px;
            background: #10b981;
            color: white;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            z-index: 10;
        }
        .laptop-image {
            width: 100%;
            height: 180px;
            object-fit: cover;
            background: rgba(255,255,255,0.05);
        }
        .laptop-body {
            padding: 1.25rem;
        }
        .laptop-name {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0.75rem;
            line-height: 1.3;
        }
        .laptop-specs {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }
        .laptop-specs span {
            background: rgba(255,255,255,0.1);
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }
        .compat-score {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }
        .compat-bar {
            flex: 1;
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            overflow: hidden;
        }
        .compat-bar-fill {
            height: 100%;
            border-radius: 4px;
            background: linear-gradient(90deg, #10b981, #34d399);
        }
        .compat-percent {
            font-weight: 600;
            color: #10b981;
        }
        .laptop-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .laptop-price {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--accent-primary);
        }
        .btn-view {
            padding: 0.5rem 1rem;
            background: var(--accent-primary);
            border: none;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-view:hover {
            background: var(--accent-secondary);
        }
        .loading-state {
            text-align: center;
            padding: 4rem;
        }
        .loading-state i {
            font-size: 3rem;
            color: var(--accent-primary);
            margin-bottom: 1rem;
        }
        .filter-bar {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }
        .filter-bar select {
            padding: 0.75rem 1rem;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            color: var(--text-primary);
            cursor: pointer;
        }
        @media (max-width: 768px) {
            .game-banner { flex-direction: column; text-align: center; }
            .game-banner img { width: 100%; max-width: 300px; }
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-brand">
            <i class="fas fa-laptop"></i>
            <span>SpecMatch</span>
        </div>
        <div class="nav-right">
            <div class="user-info">
                <i class="fas fa-user-circle"></i>
                <span id="userName">User</span>
            </div>
        </div>
    </nav>

    <div class="best-container">
        <button class="back-btn" onclick="goBack()">
            <i class="fas fa-arrow-left"></i> Back to Dashboard
        </button>

        <div id="gameBanner" class="game-banner" style="display: none;">
            <img id="gameImage" src="" alt="Game">
            <div>
                <h1 id="gameName">Game Name</h1>
                <p><i class="fas fa-gamepad"></i> Finding the best laptops for this game...</p>
            </div>
        </div>

        <h2 class="section-title"><i class="fas fa-trophy"></i> Top Recommended Laptops</h2>

        <div class="filter-bar">
            <select id="priceFilter" onchange="filterLaptops()">
                <option value="all">All Prices</option>
                <option value="500">Under $500</option>
                <option value="1000">Under $1000</option>
                <option value="1500">Under $1500</option>
                <option value="2000">Under $2000</option>
            </select>
            <select id="sortFilter" onchange="filterLaptops()">
                <option value="compat">Best Compatibility</option>
                <option value="price-low">Price: Low to High</option>
                <option value="price-high">Price: High to Low</option>
                <option value="value">Best Value</option>
            </select>
        </div>

        <div id="laptopsGrid" class="laptops-grid">
            <div class="loading-state">
                <i class="fas fa-spinner fa-spin"></i>
                <p>Finding best laptops...</p>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCywnIfR3dhZAWLT-1Nn6iz_6BCBgipLqE",
            authDomain: "specmatch-auth.firebaseapp.com",
            projectId: "specmatch-auth",
            storageBucket: "specmatch-auth.firebasestorage.app",
            messagingSenderId: "170230638392",
            appId: "1:170230638392:web:b321a6925f740afd16c3cd"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById("userName").textContent = user.displayName || user.email.split('@')[0];
                loadBestLaptops();
            } else {
                window.location.href = "login.html";
            }
        });

        window.goBack = () => {
            window.location.href = "dashboard.html";
        };
    </script>

    <script>
        let allLaptops = [];
        let gameInfo = null;

        async function loadBestLaptops() {
            const gameData = JSON.parse(localStorage.getItem('checkGame'));
            if (!gameData) {
                document.getElementById('laptopsGrid').innerHTML = `
                    <div class="loading-state">
                        <i class="fas fa-question-circle"></i>
                        <p>No game selected. Please select a game from the dashboard.</p>
                    </div>
                `;
                return;
            }

            try {
                let gameId = gameData.gameId;

                // If from Steam lookup, fetch details first
                if (!gameData.fromDB && gameData.appid) {
                    const fetchRes = await fetch('http://localhost:3000/api/games/fetch-details', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ appid: gameData.appid })
                    });
                    const fetchData = await fetchRes.json();
                    if (fetchData.success && fetchData.data) {
                        gameId = fetchData.data._id;
                        gameInfo = fetchData.data;
                    }
                } else if (gameId) {
                    const gameRes = await fetch(`http://localhost:3000/api/games/${gameId}`);
                    const gameResData = await gameRes.json();
                    if (gameResData.success) {
                        gameInfo = gameResData.data;
                    }
                }

                // Show game banner
                const banner = document.getElementById('gameBanner');
                const steamAppId = gameInfo?.steam_app_id || gameData.appid || 0;
                document.getElementById('gameImage').src = gameInfo?.image || `https://cdn.cloudflare.steamstatic.com/steam/apps/${steamAppId}/header.jpg`;
                document.getElementById('gameName').textContent = gameData.name;
                banner.style.display = 'flex';

                // Fetch gaming laptops
                const laptopsRes = await fetch('http://localhost:3000/api/laptops/rank?sortBy=gaming&limit=20');
                const laptopsData = await laptopsRes.json();

                if (laptopsData.success && laptopsData.data && laptopsData.data.length > 0) {
                    allLaptops = laptopsData.data;
                    displayLaptops(allLaptops);
                } else {
                    // Fallback to search
                    const searchRes = await fetch('http://localhost:3000/api/laptops/search?limit=20&sortBy=gpuScore&sortOrder=desc');
                    const searchData = await searchRes.json();
                    if (searchData.laptops && searchData.laptops.length > 0) {
                        allLaptops = searchData.laptops;
                        displayLaptops(allLaptops);
                    } else {
                        document.getElementById('laptopsGrid').innerHTML = `
                            <div class="loading-state">
                                <i class="fas fa-laptop"></i>
                                <p>No laptops found in database.</p>
                            </div>
                        `;
                    }
                }

            } catch (err) {
                console.error('Error loading laptops:', err);
                document.getElementById('laptopsGrid').innerHTML = `
                    <div class="loading-state">
                        <i class="fas fa-exclamation-circle"></i>
                        <p>Error loading laptops: ${err.message}</p>
                    </div>
                `;
            }
        }

        function displayLaptops(laptops) {
            const grid = document.getElementById('laptopsGrid');
            
            if (!laptops || laptops.length === 0) {
                grid.innerHTML = `
                    <div class="loading-state">
                        <i class="fas fa-laptop"></i>
                        <p>No matching laptops found.</p>
                    </div>
                `;
                return;
            }

            grid.innerHTML = laptops.map((laptop, index) => {
                const price = laptop.pricing?.estimated_price_usd || laptop.price || 0;
                const cpuScore = laptop.cpu?.score || 0;
                const gpuScore = laptop.gpu?.score || 0;
                const compatScore = Math.min(100, Math.round((cpuScore + gpuScore) / 2));
                
                return `
                    <div class="laptop-card ${index === 0 ? 'recommended' : ''}">
                        <img class="laptop-image" 
                             src="${laptop.images?.[0] || laptop.image || 'https://via.placeholder.com/320x180?text=Laptop'}" 
                             alt="${laptop.name}"
                             onerror="this.src='https://via.placeholder.com/320x180?text=Laptop'">
                        <div class="laptop-body">
                            <h3 class="laptop-name">${laptop.name || laptop.brand + ' Laptop'}</h3>
                            <div class="laptop-specs">
                                <span><i class="fas fa-microchip"></i> ${laptop.cpu?.name || 'N/A'}</span>
                                <span><i class="fas fa-tv"></i> ${laptop.gpu?.name || 'Integrated'}</span>
                                <span><i class="fas fa-memory"></i> ${laptop.ram?.size_gb || '?'} GB</span>
                            </div>
                            <div class="compat-score">
                                <span style="color: var(--text-secondary); font-size: 0.85rem;">Compatibility:</span>
                                <div class="compat-bar">
                                    <div class="compat-bar-fill" style="width: ${compatScore}%"></div>
                                </div>
                                <span class="compat-percent">${compatScore}%</span>
                            </div>
                            <div class="laptop-footer">
                                <span class="laptop-price">$${price.toLocaleString()}</span>
                                <button class="btn-view" onclick="viewLaptop('${laptop._id}')">
                                    <i class="fas fa-eye"></i> View
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function filterLaptops() {
            const priceFilter = document.getElementById('priceFilter').value;
            const sortFilter = document.getElementById('sortFilter').value;

            let filtered = [...allLaptops];

            // Apply price filter
            if (priceFilter !== 'all') {
                const maxPrice = parseInt(priceFilter);
                filtered = filtered.filter(l => (l.pricing?.estimated_price_usd || l.price || 0) <= maxPrice);
            }

            // Apply sort
            switch (sortFilter) {
                case 'price-low':
                    filtered.sort((a, b) => (a.pricing?.estimated_price_usd || 0) - (b.pricing?.estimated_price_usd || 0));
                    break;
                case 'price-high':
                    filtered.sort((a, b) => (b.pricing?.estimated_price_usd || 0) - (a.pricing?.estimated_price_usd || 0));
                    break;
                case 'value':
                    filtered.sort((a, b) => {
                        const scoreA = ((a.cpu?.score || 0) + (a.gpu?.score || 0)) / (a.pricing?.estimated_price_usd || 1);
                        const scoreB = ((b.cpu?.score || 0) + (b.gpu?.score || 0)) / (b.pricing?.estimated_price_usd || 1);
                        return scoreB - scoreA;
                    });
                    break;
                default: // compat
                    filtered.sort((a, b) => ((b.cpu?.score || 0) + (b.gpu?.score || 0)) - ((a.cpu?.score || 0) + (a.gpu?.score || 0)));
            }

            displayLaptops(filtered);
        }

        function viewLaptop(laptopId) {
            window.location.href = `laptop-details.html?id=${laptopId}`;
        }

        window.filterLaptops = filterLaptops;
        window.viewLaptop = viewLaptop;
    </script>
</body>
</html>
